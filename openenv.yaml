name: email-triage-env
version: "1.0"
description: "An RL environment where an AI agent triages emails by priority and category"

observation_space:
  email_subject: string
  email_body: string
  sender: string
  task_level: string

action_space:
  priority:
    type: categorical
    values: [urgent, normal, low]
  category:
    type: categorical
    values: [bug_report, billing, general]

tasks:
  - id: task_easy
    level: easy
    description: "Classify a critical bug report email"
  - id: task_medium
    level: medium
    description: "Classify a billing inquiry email"
  - id: task_hard
    level: hard
    description: "Classify an ambiguous follow-up email"

reward:
  min: 0.0
  max: 1.0
  partial_credit: true

api:
  endpoints:
    - reset()
    - step()
    - state()